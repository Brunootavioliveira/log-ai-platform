version: "3.9"

services:

  rabbitmq:
    image: rabbitmq:3-management
    container_name: log-platform-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  postgres:
    image: postgres:15
    container_name: log-platform-postgres
    environment:
      POSTGRES_DB: log_platform
      POSTGRES_USER: log_user
      POSTGRES_PASSWORD: log_password
    ports:
      - "5432:5432"
